<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <title>Pokemon web site</title>
  </head>
  <body class="bg-gray-200">
    <main class="mt-18 mb-36">
      <div
        class="mx-auto w-3xs rounded-[12px] border-11 border-solid border-gray-700"
      >
        <div class="relative rounded-tl-2xl rounded-tr-2xl">
          <img class="w-59" src="assets/images/kakuna.png" alt="this is  pic" />
          <div
            class="top-3 right-3 z-10 flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-gray-700 md:absolute"
          >
            <span class="f px-1 py-2 text-sm/snug font-bold text-amber-50">
              014
            </span>
          </div>
        </div>

        <div class="flex flex-col gap-y-1 rounded-b-2xl">
          <div class="mt-[8px] ml-[14px] flex flex-col gap-0.5">
            <div class="flex items-center gap-2">
              <h1 class="text-[18px] leading-[28px] font-extrabold">Kakuna</h1>
              <button
                class="cursor-pointer rounded-[14px] bg-gray-700 px-2 py-1 text-[12px] leading-[16px] font-bold text-amber-50"
                type="button"
              >
                Bug
              </button>
            </div>
            <p class="leading[16px] text-[12px] font-medium text-gray-500">
              Cocoon Pokémon
            </p>
          </div>
          <div class="mt-[8px] ml-[14px] flex gap-1">
            <div
              class="flex w-14 items-center justify-center gap-1 rounded-[4px] bg-gray-100 px-1 py-1"
            >
              <span class="text-[14px] leading-4 font-normal text-gray-700"
                >HP</span
              >
              <span class="text-[14px] leading-4 font-bold text-gray-700"
                >485</span
              >
            </div>
            <div
              class="flex w-14 items-center justify-center gap-1 rounded-[4px] bg-gray-100 px-1 py-1"
            >
              <span class="text-[14px] leading-4 font-normal text-gray-700"
                >CP</span
              >
              <span class="text-[14px] leading-4 font-bold text-gray-700"
                >405</span
              >
            </div>
            <div
              class="flex w-16 items-center justify-center gap-1 rounded-[4px] bg-gray-100 px-1 py-1"
            >
              <span class="text-[14px] leading-4 font-normal text-gray-700"
                >W</span
              >
              <span class="text-[14px] leading-4 font-bold text-gray-700"
                >0.68m</span
              >
            </div>
          </div>
          <div class="mb-[24px] ml-[14px] flex gap-1">
            <div
              class="flex w-16 items-center justify-center gap-1 rounded-[4px] bg-gray-100 px-1 py-1"
            >
              <img src="assets/icons/shield.svg" alt="this is icon" />
              <span class="text-[14px] leading-4 font-bold text-gray-700"
                >Grass</span
              >
            </div>
            <div
              class="flex w-22 items-center justify-center gap-1 rounded-[4px] bg-gray-100 px-1 py-1"
            >
              <img src="assets/icons/shield.svg" alt="this is icon" />
              <span class="text-[14px] leading-4 font-bold text-gray-700"
                >Fighting</span
              >
            </div>
            <div
              class="flex w-13 items-center justify-center gap-1 rounded-[4px] bg-gray-100 px-1 py-1"
            >
              <img src="assets/icons/trending_down.svg" alt="this is icon" />
              <span class="text-[14px] leading-4 font-bold text-gray-700"
                >Fire</span
              >
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
